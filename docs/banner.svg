<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="35%" style="stop-color:#74c7ec"/>
      <stop offset="65%" style="stop-color:#94e2d5"/>
      <stop offset="100%" style="stop-color:#a6e3a1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#89b4fa"/>
      <stop offset="50%" style="stop-color:#74c7ec"/>
      <stop offset="80%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#a6e3a1;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#45475a" stroke-width="1"/>

  <!-- Decorative dew drops (top-right) -->
  <g opacity="0.09" transform="translate(660, 70)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#a6e3a1" opacity="0.4"/>
  </g>
  <g opacity="0.06" transform="translate(720, 120)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
  </g>
  <g opacity="0.05" transform="translate(690, 170)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
  </g>

  <!-- Secondary dew drops (bottom-left) -->
  <g opacity="0.05" transform="translate(100, 200)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
  </g>
  <g opacity="0.04" transform="translate(60, 160)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="60" cy="45" r="1.5" fill="#89b4fa"/>
    <circle cx="80" cy="40" r="1" fill="#74c7ec"/>
    <circle cx="100" cy="50" r="1.5" fill="#94e2d5"/>
    <circle cx="75" cy="60" r="1" fill="#a6e3a1"/>
    <circle cx="95" cy="33" r="1" fill="#89b4fa"/>
    <circle cx="115" cy="43" r="1.5" fill="#74c7ec"/>
    <circle cx="40" cy="53" r="1" fill="#94e2d5"/>
    <circle cx="120" cy="57" r="1" fill="#b4befe"/>
    <circle cx="50" cy="35" r="1.5" fill="#89b4fa"/>
    <circle cx="130" cy="37" r="1" fill="#74c7ec"/>
    <circle cx="710" cy="215" r="1.5" fill="#94e2d5"/>
    <circle cx="690" cy="225" r="1" fill="#89b4fa"/>
    <circle cx="730" cy="230" r="1.5" fill="#74c7ec"/>
    <circle cx="705" cy="240" r="1" fill="#a6e3a1"/>
    <circle cx="675" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="740" cy="220" r="1" fill="#89b4fa"/>
  </g>

  <!-- Title -->
  <text x="400" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="72" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="12" filter="url(#glow)">DEW</text>

  <!-- Accent line under title -->
  <rect x="250" y="148" width="300" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="180" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">ENCRYPTED HTTPS REVERSE SHELL</text>

  <!-- Feature badges -->
  <g transform="translate(82, 210)">
    <!-- xchacha20 -->
    <rect x="0" y="0" width="145" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="145" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#a6e3a1"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">xchacha20-poly</text>

    <!-- https -->
    <rect x="162" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="162" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="180" cy="14" r="4" fill="#89b4fa"/>
    <text x="192" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">https</text>

    <!-- ~37 KB -->
    <rect x="279" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="279" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="297" cy="14" r="4" fill="#f38ba8"/>
    <text x="309" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">~37 KB</text>

    <!-- jittered -->
    <rect x="396" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="396" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="414" cy="14" r="4" fill="#74c7ec"/>
    <text x="426" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">jittered</text>

    <!-- no deps -->
    <rect x="513" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="513" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="531" cy="14" r="4" fill="#fab387"/>
    <text x="543" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">no deps</text>
  </g>
</svg>
