<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: red tones for light mode -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="40%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Droplet fill gradient -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Radiating line gradient -->
    <linearGradient id="g4" x1="50%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#dc2626" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Center dot glow -->
    <filter id="centerglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#dc2626" opacity="0.03"/>

    <!-- Dewdrop shape: teardrop with bezier curves — point at top, round at bottom -->
    <path d="M 80 42 C 80 42, 62 68, 62 82 C 62 92, 70 100, 80 100 C 90 100, 98 92, 98 82 C 98 68, 80 42, 80 42 Z"
          fill="url(#g3)" fill-opacity="0.15" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bright center dot inside the droplet -->
    <circle cx="80" cy="80" r="3" fill="#dc2626" opacity="0.95" filter="url(#centerglow)"/>

    <!-- Radiating line 1: to upper-right hex edge -->
    <line x1="80" y1="80" x2="130" y2="45" stroke="#dc2626" stroke-width="1.5" opacity="0.4"/>
    <!-- Endpoint node 1 -->
    <circle cx="130" cy="45" r="2" fill="#dc2626" opacity="0.65"/>

    <!-- Radiating line 2: to lower-right hex edge -->
    <line x1="80" y1="80" x2="135" y2="95" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>
    <!-- Endpoint node 2 -->
    <circle cx="135" cy="95" r="2" fill="#ef4444" opacity="0.55"/>

    <!-- Radiating line 3: to upper-left hex edge -->
    <line x1="80" y1="80" x2="28" y2="48" stroke="#dc2626" stroke-width="1.5" opacity="0.35"/>
    <!-- Endpoint node 3 -->
    <circle cx="28" cy="48" r="2" fill="#dc2626" opacity="0.6"/>

    <!-- Radiating line 4: to lower-left hex edge -->
    <line x1="80" y1="80" x2="25" y2="95" stroke="#dc2626" stroke-width="1.5" opacity="0.25"/>
    <!-- Endpoint node 4 -->
    <circle cx="25" cy="95" r="2" fill="#ef4444" opacity="0.5"/>

    <!-- Particle dots along radiating lines -->
    <circle cx="105" cy="62" r="1.3" fill="#dc2626" opacity="0.35"/>
    <circle cx="110" cy="88" r="1.2" fill="#ef4444" opacity="0.3"/>
    <circle cx="54" cy="64" r="1.3" fill="#dc2626" opacity="0.33"/>
    <circle cx="50" cy="88" r="1.2" fill="#ef4444" opacity="0.25"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#dc2626" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#ef4444" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "DEW" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">DEW</text>

  <!-- Thin separator line -->
  <line x1="300" y1="128" x2="530" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">ENCRYPTED HTTPS REVERSE SHELL</text>

  <!-- Descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">XCHACHA20  ·  POLY1305  ·  TLS  ·  ~37KB</text>
</svg>
