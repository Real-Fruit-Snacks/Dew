<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: red to maroon (3-stop, 40% mid) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="40%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Accent gradient: maroon to red -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eba0ac"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="50%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Softglow filter -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f38ba8" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK: The Dewdrop ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#f38ba8" opacity="0.04"/>

    <!-- Dewdrop teardrop shape -->
    <path d="M 80 42 C 80 42, 62 68, 62 82 C 62 92, 70 100, 80 100 C 90 100, 98 92, 98 82 C 98 68, 80 42, 80 42 Z"
          fill="url(#g3)" fill-opacity="0.15" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bright center dot inside the droplet -->
    <circle cx="80" cy="80" r="3" fill="#f38ba8" opacity="0.95"/>

    <!-- Radiating line 1: to upper-right hex edge -->
    <line x1="80" y1="80" x2="130" y2="45" stroke="#f38ba8" stroke-width="1.5" opacity="0.45"/>
    <circle cx="130" cy="45" r="2" fill="#f38ba8" opacity="0.7"/>

    <!-- Radiating line 2: to lower-right hex edge -->
    <line x1="80" y1="80" x2="135" y2="95" stroke="#f38ba8" stroke-width="1.5" opacity="0.35"/>
    <circle cx="135" cy="95" r="2" fill="#eba0ac" opacity="0.6"/>

    <!-- Radiating line 3: to upper-left hex edge -->
    <line x1="80" y1="80" x2="28" y2="48" stroke="#f38ba8" stroke-width="1.5" opacity="0.4"/>
    <circle cx="28" cy="48" r="2" fill="#f38ba8" opacity="0.65"/>

    <!-- Radiating line 4: to lower-left hex edge -->
    <line x1="80" y1="80" x2="25" y2="95" stroke="#f38ba8" stroke-width="1.5" opacity="0.3"/>
    <circle cx="25" cy="95" r="2" fill="#eba0ac" opacity="0.55"/>

    <!-- Particle dots along radiating lines -->
    <circle cx="105" cy="62" r="1.3" fill="#f38ba8" opacity="0.4"/>
    <circle cx="110" cy="88" r="1.2" fill="#eba0ac" opacity="0.35"/>
    <circle cx="54" cy="64" r="1.3" fill="#f38ba8" opacity="0.38"/>
    <circle cx="50" cy="88" r="1.2" fill="#eba0ac" opacity="0.3"/>

    <!-- Corner accents -->
    <circle cx="80" cy="6" r="2" fill="#f38ba8" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#eba0ac" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">DEW</text>

  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">ENCRYPTED HTTPS REVERSE SHELL</text>

  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">XCHACHA20  ·  POLY1305  ·  TLS  ·  ~37KB</text>
</svg>
